apiVersion: 1

# Grafana dashboard provisioning
# Auto-loads dashboards from the /etc/grafana/dashboards directory.

providers:
  - name: JMeter Performance Dashboards
    orgId: 1
    folder: Performance Testing
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
