# =============================================================================
# Performance Monitoring Stack: InfluxDB 1.8 + Grafana
# Author: Syed Sabah Hassan | Senior Performance Tester
#
# Usage:
#   docker compose up -d                    # Start stack
#   docker compose down                     # Stop stack
#   docker compose down -v                  # Stop + wipe volumes
#
# Grafana UI:  http://localhost:3000  (admin / admin)
# InfluxDB:    http://localhost:8086
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # InfluxDB 1.8 - Time-series DB for JMeter metrics
  # JMeter's built-in InfluxDB Backend Listener writes to this instance.
  # ---------------------------------------------------------------------------
  influxdb:
    image: influxdb:1.8-alpine
    platform: linux/amd64      # InfluxDB 1.8 has no ARM64 image; Rosetta 2 handles this on Apple Silicon
    container_name: perf_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=jmeter
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-influxadmin}
      - INFLUXDB_USER=${INFLUXDB_USER:-jmeter}
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD:-jmeter}
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_DATA_ENGINE=tsm1
      - INFLUXDB_REPORTING_DISABLED=true
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./influxdb/influxdb.conf:/etc/influxdb/influxdb.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - perf_net

  # ---------------------------------------------------------------------------
  # Grafana - Dashboards for real-time performance visualisation
  # Pre-provisioned with InfluxDB datasource and JMeter dashboard.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: perf_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/jmeter-performance.json
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - perf_net

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  influxdb_data:
    driver: local
  grafana_data:
    driver: local

networks:
  perf_net:
    driver: bridge
